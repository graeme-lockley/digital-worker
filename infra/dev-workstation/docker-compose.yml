name: dev-workstation

services:
  agent-register:
    build:
      context: .
      dockerfile: infra/dev-workstation/Dockerfile.agent-register
    ports:
      - "3001:3001"
    command:
      - node
      - dist/index.js
      - --host
      - "0.0.0.0"
      - --port
      - "3001"
      - --heartbeat-interval
      - "15000"
      - --heartbeat-timeout
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  agent-core:
    build:
      context: .
      dockerfile: infra/dev-workstation/Dockerfile.agent-core
    entrypoint: ["/app/apps/agent-core/restart-loop.sh"]
    ports:
      - "3000:3000"
    depends_on:
      agent-register:
        condition: service_healthy
    command:
      - node
      - dist/index.js
      - --host
      - "0.0.0.0"
      - --port
      - "3000"
      - --register-url
      - http://agent-register:3001
      - --endpoint-url
      - http://agent-core:3000
      - --agent-id
      - dev-workstation-agent-core
      - --agent-name
      - Aida
      - --workspace-dir
      - /app/workspace/Aida
      - --provider
      - deepseek
      - --model
      - deepseek-v4-flash
      - --skills
      - pnpm-workspace,conventional-commits
    env_file:
      - .env
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    volumes:
      - ./workspace/Aida:/app/workspace/Aida
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
